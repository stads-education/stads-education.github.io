    theme: cosmo
    css: styles/custom.css
    include-after-body:
      text: |
        <script>
        document.addEventListener("DOMContentLoaded", function() {
          const links = document.querySelectorAll('.new-tab');
          links.forEach(link => {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
          });
        });
        </script>